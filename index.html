<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="hud">
        <div>
          <span class="label">Player</span>
          <span id="playerScore">0</span>
        </div>
        <div class="center-text">
          <h1>PONG</h1>
          <p>First to 7 wins</p>
        </div>
        <div>
          <span class="label">CPU</span>
          <span id="cpuScore">0</span>
        </div>
      </div>

      <canvas id="game" width="900" height="540" aria-label="Pong game area"></canvas>

      <section class="controls">
        <p>Desktop: <strong>W / S</strong> or <strong>↑ / ↓</strong>. Phone: use the touch buttons below.</p>
        <button id="restartBtn">Restart Game</button>
      </section>

      <section class="touch-controls" aria-label="Mobile controls">
        <button id="upBtn" class="touch-btn" aria-label="Move paddle up">▲</button>
        <button id="downBtn" class="touch-btn" aria-label="Move paddle down">▼</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
